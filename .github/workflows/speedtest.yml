name: 多域名测速

on:
  schedule:
    - cron: '0 */6 * * *'  # 每6小时运行一次
  workflow_dispatch:        # 支持手动触发

# 添加并发控制，避免多个运行实例冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  speedtest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          # 移除缓存配置，因为我们没有锁文件
          
      - name: 安装依赖
        run: |
          # 安装jq（如果不存在）
          sudo apt-get update && sudo apt-get install -y jq
      
      - name: 创建测速脚本
        run: |
          mkdir -p scripts
          cat > scripts/speedtest.js << 'EOF'
          const domains = [
            'wdfiles.mirror.lestday233.eu.org',
            'img.mirror.lestday233.eu.org',
            'cdn.mirror.lestday233.eu.org'
          ];

          const API_BASE = 'https://api-v2.cenguigui.cn/api/ping/api.php';
          const TIMEOUT = 10000; // 10秒超时

          function getCurrentTime() {
            return new Date().toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
          }

          function formatNumber(num) {
            return num ? num.toFixed(2) : '0.00';
          }

          async function testDomain(domain) {
            const startTime = Date.now();
            try {
              const controller = new AbortController();
              const timeoutId = setTimeout(() => controller.abort(), TIMEOUT);
              
              const url = `${API_BASE}?url=${encodeURIComponent(domain)}`;
              const response = await fetch(url, { signal: controller.signal });
              clearTimeout(timeoutId);
              
              const data = await response.json();
              const elapsed = Date.now() - startTime;
              
              if (data.code === 200 && data.data) {
                return {
                  domain,
                  location: data.data.location || '未知',
                  ip: data.data.ip || '未知',
                  max: parseFloat(data.data.max) || 0,
                  min: parseFloat(data.data.min) || 0,
                  avg: parseFloat(data.data.average) || 0,
                  responseTime: elapsed,
                  success: true
                };
              } else {
                return {
                  domain,
                  success: false,
                  error: data.msg || '测速失败',
                  responseTime: elapsed
                };
              }
            } catch (error) {
              return {
                domain,
                success: false,
                error: error.name === 'AbortError' ? '超时' : error.message,
                responseTime: Date.now() - startTime
              };
            }
          }

          function generateTableRow(result) {
            if (!result.success) {
              return `| ${result.domain} | ❌ 失败 | ${result.error} | - | - | - |`;
            }
            
            const status = result.avg < 200 ? '✅' : (result.avg < 500 ? '⚠️' : '❌');
            return `| ${result.domain} | ${status} ${result.location} | ${result.ip} | ${formatNumber(result.min)}ms | ${formatNumber(result.avg)}ms | ${formatNumber(result.max)}ms |`;
          }

          function generateMarkdownTable(results, timestamp) {
            const header = '| 域名 | 状态/位置 | IP地址 | 最小延迟 | 平均延迟 | 最大延迟 |\n|------|-----------|--------|----------|----------|----------|\n';
            const rows = results.map(generateTableRow).join('\n');
            
            return `## 🌐 最新测速结果\n\n最后更新：${timestamp}\n\n${header}${rows}\n\n<sub>✅ 良好 (<200ms) | ⚠️ 一般 (200-500ms) | ❌ 较差 (>500ms)</sub>`;
          }

          async function main() {
            console.log('🚀 开始测速，域名列表:', domains);
            
            const results = [];
            for (const [index, domain] of domains.entries()) {
              console.log(`[${index + 1}/${domains.length}] 正在测试: ${domain}`);
              const result = await testDomain(domain);
              results.push(result);
              
              if (result.success) {
                console.log(`   ✓ 成功: ${result.avg}ms (${result.location})`);
              } else {
                console.log(`   ✗ 失败: ${result.error}`);
              }
              
              // 避免API限流，最后一项不延迟
              if (index < domains.length - 1) {
                await new Promise(resolve => setTimeout(resolve, 1500));
              }
            }
            
            const timestamp = getCurrentTime();
            const markdownTable = generateMarkdownTable(results, timestamp);
            
            // 保存JSON格式
            const fs = require('fs');
            fs.writeFileSync('speedtest-results.json', JSON.stringify({
              timestamp,
              results,
              summary: {
                total: results.length,
                success: results.filter(r => r.success).length,
                failed: results.filter(r => !r.success).length,
                avgResponse: results.filter(r => r.success).reduce((acc, r) => acc + r.avg, 0) / (results.filter(r => r.success).length || 1)
              }
            }, null, 2));
            
            // 保存Markdown表格
            fs.writeFileSync('SPEEDTEST.md', markdownTable);
            
            console.log('\n✅ 测速完成，结果已保存');
            console.log(markdownTable);
          }

          main().catch(error => {
            console.error('❌ 测速失败:', error);
            process.exit(1);
          });
          EOF
      
      - name: 运行测速脚本
        run: node scripts/speedtest.js
        id: speedtest
        continue-on-error: true  # 即使失败也继续
      
      - name: 准备更新内容
        id: prepare
        run: |
          # 读取时间戳
          if [ -f speedtest-results.json ]; then
            TIMESTAMP=$(jq -r '.timestamp' speedtest-results.json)
            echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
            
            # 读取成功/失败统计
            SUCCESS=$(jq '.summary.success' speedtest-results.json)
            FAILED=$(jq '.summary.failed' speedtest-results.json)
            echo "success_count=$SUCCESS" >> $GITHUB_OUTPUT
            echo "failed_count=$FAILED" >> $GITHUB_OUTPUT
          else
            echo "timestamp=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
            echo "success_count=0" >> $GITHUB_OUTPUT
            echo "failed_count=0" >> $GITHUB_OUTPUT
          fi
      
      - name: 更新README.md
        run: |
          START_MARK="<!-- SPEEDTEST-START -->"
          END_MARK="<!-- SPEEDTEST-END -->"
          
          # 检查SPEEDTEST.md是否存在
          if [ ! -f SPEEDTEST.md ]; then
            echo "⚠️ 测速结果文件不存在，跳过更新"
            exit 0
          fi
          
          # 读取新内容
          NEW_CONTENT=$(cat SPEEDTEST.md)
          
          # 检查README是否存在
          if [ ! -f README.md ]; then
            echo "# 测速结果" > README.md
          fi
          
          # 创建临时文件
          cp README.md README.tmp
          
          # 如果存在标记，替换内容；否则追加
          if grep -q "$START_MARK" README.tmp; then
            # 使用awk替换标记间的内容
            awk -v start="$START_MARK" -v end="$END_MARK" -v new="$NEW_CONTENT" '
              BEGIN { in_block = 0 }
              {
                if ($0 ~ start) {
                  print $0
                  print ""
                  print new
                  print ""
                  in_block = 1
                  next
                }
                if ($0 ~ end) {
                  print $0
                  in_block = 0
                  next
                }
                if (!in_block) {
                  print $0
                }
              }
            ' README.tmp > README.new
            mv README.new README.tmp
          else
            # 追加到文件末尾
            echo -e "\n\n${START_MARK}\n\n${NEW_CONTENT}\n\n${END_MARK}" >> README.tmp
          fi
          
          # 替换原文件
          mv README.tmp README.md
          
          echo "✅ README.md 已更新"
      
      - name: 创建测速徽章
        if: success() || failure()
        run: |
          if [ -f speedtest-results.json ]; then
            SUCCESS=$(jq '.summary.success' speedtest-results.json)
            FAILED=$(jq '.summary.failed' speedtest-results.json)
            TOTAL=$(jq '.summary.total' speedtest-results.json)
            AVG=$(jq '.summary.avgResponse' speedtest-results.json)
            
            # 处理AVG为null或0的情况
            if [ "$AVG" = "null" ] || [ -z "$AVG" ]; then
              AVG=0
            fi
            
            # 格式化平均延迟为整数
            AVG_INT=$(printf "%.0f" $AVG 2>/dev/null || echo "0")
            
            echo "📊 测速统计: 总计 $TOTAL 域名, 成功 $SUCCESS, 失败 $FAILED, 平均延迟 ${AVG_INT}ms"
            
            # 可选：生成shield.io徽章URL
            echo "📛 徽章URL: https://img.shields.io/badge/测速-${SUCCESS}成功%20${FAILED}失败%20${AVG_INT}ms-blue"
          fi
      
      - name: 提交更改
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🤖 自动更新测速结果 [$(date -u "+%Y-%m-%d %H:%M:%S")]'
          commit_user_name: 'github-actions[bot]'
          commit_user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_author: 'github-actions[bot] <github-actions[bot]@users.noreply.github.com>'
          file_pattern: README.md speedtest-results.json SPEEDTEST.md
          skip_dirty_check: false
          skip_fetch: true